name: CI

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main
      - master
      - develop

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  dprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check formatting with dprint
        uses: dprint/check@v2.2

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-stable-rustfmt-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-rustfmt-
            ${{ runner.os }}-cargo-stable-
      - run: cargo +stable fmt -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-stable-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-clippy-
            ${{ runner.os }}-cargo-stable-
      - run: cargo +stable clippy --all-targets --all-features -- -D warnings

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup toolchain install nightly --profile minimal
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-nightly-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-doc-
            ${{ runner.os }}-cargo-nightly-
            ${{ runner.os }}-cargo-stable-
      - run: cargo +nightly doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: --cfg docsrs

  test-linux:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref_type != 'tag'
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-stable-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-test-
            ${{ runner.os }}-cargo-stable-
      - run: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
      - run: cargo +stable test --locked --all-features --all-targets

  test-macos:
    if: ${{ false }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-stable-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-test-
            ${{ runner.os }}-cargo-stable-
      - run: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
      - run: cargo +stable test --locked --all-features --all-targets
